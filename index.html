<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Global Surf Forecast Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="page-header">
      <h1>🌊 Global Surf Forecast Dashboard</h1>
      <p>Explore world-class surf spots and compare upcoming wave windows.</p>
    </header>

    <main class="layout">
      <section class="panel map-panel">
        <div id="map" aria-label="Map of surf spots"></div>
      </section>

      <section class="panel controls-panel">
        <h2>Forecast Controls</h2>

        <label for="spot-select">Surf Spot</label>
        <select id="spot-select"></select>

        <label for="window-range">Forecast Window: <span id="window-value">3</span> days</label>
        <input id="window-range" type="range" min="1" max="7" value="3" />

        <label for="skill-level">Rider Skill</label>
        <select id="skill-level">
          <option value="beginner">Beginner</option>
          <option value="intermediate" selected>Intermediate</option>
          <option value="advanced">Advanced</option>
        </select>

        <div class="card" id="conditions-summary" aria-live="polite"></div>
      </section>

      <section class="panel chart-panel">
        <h2>Wave Height Forecast (meters)</h2>
        <canvas id="forecast-chart" aria-label="Wave height forecast chart"></canvas>
      </section>
    </main>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="app.js"></script>
  </body>
</html>
