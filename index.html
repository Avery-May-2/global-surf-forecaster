<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Surfability Intelligence Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div>
        <h1>🌊 Surfability Intelligence Dashboard</h1>
        <p>Real-time + 7-day decision support for “is it surfable right now?”</p>
      </div>
      <div class="controls-inline">
        <label>Spot <select id="spotSelect"></select></label>
        <label>Skill
          <select id="skillSelect">
            <option>Beginner</option>
            <option selected>Intermediate</option>
            <option>Advanced</option>
          </select>
        </label>
      </div>
    </header>

    <main class="dashboard-grid">
      <section class="panel snapshot" id="snapshotPanel"></section>

      <section class="panel timeline">
        <div class="panel-head"><h2>24-Hour Surf Timeline</h2></div>
        <canvas id="hourlyChart"></canvas>
      </section>

      <section class="panel weekly">
        <div class="panel-head"><h2>7-Day Trend Heatmap</h2></div>
        <div id="weeklyHeatmap" class="heatmap"></div>
      </section>

      <section class="panel map-panel">
        <div class="panel-head"><h2>Spot Map</h2></div>
        <div id="surfMap"></div>
      </section>

      <section class="panel details">
        <div class="panel-head"><h2>Detailed Spot Metrics</h2></div>
        <div class="split">
          <canvas id="radarChart"></canvas>
          <div id="metricBreakdown"></div>
        </div>
      </section>

      <section class="panel alerts">
        <div class="panel-head"><h2>Alerts & Notifications</h2></div>
        <div id="alertsList" class="alerts-list"></div>
      </section>

      <section class="panel analytics">
        <div class="panel-head"><h2>Condition Correlation & Personalization</h2></div>
        <div class="analytics-controls">
          <label>Personalization slider: <input type="range" id="riskSlider" min="0" max="100" value="50" /></label>
        </div>
        <canvas id="scatterChart"></canvas>
      </section>
    </main>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script type="module" src="app.js"></script>
  </body>
</html>
